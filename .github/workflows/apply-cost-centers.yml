name: Apply cost centers

# Manually triggered. Applies the team-to-cost-center mapping to the enterprise
# cost centers, with an optional dry-run preview.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Preview changes without writing to cost centers"
        type: boolean
        default: false

concurrency:
  group: apply-cost-centers
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply mapping to cost centers
        env:
          # Classic PAT with manage_billing:enterprise, read:enterprise, read:org.
          GH_TOKEN: ${{ secrets.COST_CENTER_PAT }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm run apply -- --dry-run
          else
            npm run apply
          fi
